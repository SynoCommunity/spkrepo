name: Purge All Caches

on:
  workflow_dispatch:

permissions:
  actions: write
  packages: write  # Required to delete container layers

jobs:
  clear-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # STEP 1: Purge internal GitHub Actions & Docker type=gha Caches
      - name: Delete all Action caches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching action and Docker gha caches..."
          CACHE_IDS=$(gh cache list --limit 100 --json id --jq '.[].id')
          
          if [ -z "$CACHE_IDS" ]; then
            echo "No standard action caches found."
          else
            echo "Deleting action caches..."
            for ID in $CACHE_IDS; do
              echo "Deleting cache ID: $ID"
              gh cache delete "$ID"
            done
            echo "Action cache storage completely cleared."
          fi

      # STEP 2: Purge dangling Docker Registry Layers natively from GHCR
      - name: Delete untagged GHCR container layers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE_NAME="spkrepo"
          OWNER="${{ github.repository_owner }}"
          
          echo "Fetching untagged versions for ${PACKAGE_NAME}..."
          
          # List all package version IDs that do not have any tags
          UNTAGGED_IDS=$(gh api /orgs/${OWNER}/packages/container/${PACKAGE_NAME}/versions --paginate \

            | jq -r '.[] | select(.metadata.container.tags | length == 0) | .id' 2>/dev/null || \
            gh api /users/${OWNER}/packages/container/${PACKAGE_NAME}/versions --paginate \

            | jq -r '.[] | select(.metadata.container.tags | length == 0) | .id' 2>/dev/null)

          if [ -z "$UNTAGGED_IDS" ]; then
            echo "No untagged Docker layers found in GHCR."
            exit 0
          fi

          echo "Deleting untagged layers..."
          for ID in $UNTAGGED_IDS; do
            echo "Deleting version ID: $ID"
            # Try deleting via org endpoint first, fallback to user endpoint if personal repo
            gh api --method DELETE /orgs/${OWNER}/packages/container/${PACKAGE_NAME}/versions/$ID 2>/dev/null || \
            gh api --method DELETE /users/${OWNER}/packages/container/${PACKAGE_NAME}/versions/$ID 2>/dev/null
          done
          echo "All untagged GHCR layers successfully purged."
