name: Purge All Caches

on:
  workflow_dispatch:

permissions:
  actions: write
  packages: write

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Clear GitHub Actions & GHCR Docker Caches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Delete all Action and Docker gha layer caches
          for id in $(gh cache list --repo ${{ github.repository }} --limit 100 --json id --jq '.[].id'); do
            gh cache delete "$id" --repo ${{ github.repository }}
          done

          # 2. Delete all untagged Docker layers from GHCR
          OWNER="${{ github.repository_owner }}"
          URL="/orgs/$OWNER/packages/container/spkrepo/versions"

          # Fetch matching IDs from org endpoint (or fallback to user endpoint)
          IDS=$(gh api $URL --paginate --jq '.[] | select(.metadata.container.tags | length == 0) | .id' 2>/dev/null || \
                gh api "/users/$OWNER/packages/container/spkrepo/versions" --paginate --jq '.[] | select(.metadata.container.tags | length == 0) | .id' 2>/dev/null)

          for id in $IDS; do
            gh api --method DELETE "$URL/$id" 2>/dev/null || \
            gh api --method DELETE "/users/$OWNER/packages/container/spkrepo/versions/$id" 2>/dev/null
          done

          echo "All caches and untagged container layers successfully purged."
