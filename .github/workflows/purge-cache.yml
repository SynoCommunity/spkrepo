name: Purge All Caches

on:
  workflow_dispatch:

permissions:
  actions: write

jobs:
  clear-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Delete all caches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching cache list..."
          CACHE_IDS=$(gh cache list --limit 100 --json id --jq '.[].id')
          
          if [ -z "$CACHE_IDS" ]; then
            echo "No caches found to delete."
            exit 0
          fi

          echo "Deleting caches..."
          for ID in $CACHE_IDS; do
            echo "Deleting cache ID: $ID"
            gh cache delete "$ID"
          done
          echo "All caches successfully purged."
